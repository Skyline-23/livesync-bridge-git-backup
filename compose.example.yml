services:
  couchdb:
    image: couchdb:latest
    user: "0:0"
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "5984:5984"

  livesync-bridge:
    image: ghcr.io/skyline-23/livesync-bridge-git-backup:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - couchdb
    environment:
      MODE: bridge
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      LIVESYNC_DATABASE: ${LIVESYNC_DATABASE}
      LIVESYNC_PASSPHRASE: ${LIVESYNC_PASSPHRASE}
    volumes:
      - live-vault:/data/vault

  git-backup:
    image: ghcr.io/skyline-23/livesync-bridge-git-backup:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - livesync-bridge
    environment:
      MODE: backup
      CRON_SCHEDULE: "${CRON_SCHEDULE:-0 */6 * * *}"
      GIT_TOKEN: ${GIT_TOKEN}
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
    volumes:
      - live-vault:/vault:ro
      - git-worktrees:/git

volumes:
  couchdb-data: {}
  live-vault: {}
  git-worktrees: {}
